<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>扫码登录</title>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
    --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 40%, #f0fdf4 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 28px 24px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .card h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .card .subtitle {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 20px;
  }
  #qr_png {
    display: inline-block;
    padding: 12px;
    background: white;
    border-radius: 12px;
    border: 2px solid var(--border);
  }
  .tip {
    display: inline-block;
    margin-top: 16px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--text-light);
    background: #f8fafc;
    border-radius: 99px;
    border: 1px solid var(--border);
  }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-light);
  }
</style>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="static/qrcode.min.js"></script>
</head>
<body>
<div class="card">
  <h2>全民K歌登录</h2>
  <p class="subtitle">安全登录，防止被盗</p>
  <div id="qr_png"></div>
  <p class="tip">使用全民K歌手机版扫描二维码</p>
  <p class="status"><span class="spinner"></span>等待扫码...</p>
</div>

<script>
  const getLocalIP = async () => {
    try {
      const res = await fetch('https://api64.ipify.org?format=json');
      const data = await res.json();
      return data.ip;
    } catch (err) {
      return '';
    }
  };

  var qrcode = new QRCode(document.getElementById("qr_png"), {
    correctLevel: 1,
    render: "canvas"
  });

  function makeCode () {
    var elText = "{{ url }}";
    elText = elText.replace('amp;', '');
    qrcode.makeCode(elText);
  }
  makeCode();

  getLocalIP().then(function(ip) {
    setInterval(function checkLogin() {
      $.ajax({
        url: '{{ url_for('check_login') }}',
        method: 'GET',
        dataType: 'json',
        success: function(arg) {
          if (arg.code === 0) {
            $('.status').html('<span class="spinner"></span>等待扫码...');
          } else if (arg.code === 1) {
            $('.status').text('二维码已过期，自动刷新...');
            location.href = "{{ url_for('login') }}";
          } else if (arg.code === 2) {
            $('.status').text('登录成功，正在跳转...');
            location.href = "{{ url_for('visitor') }}" + "?cookie=" + arg.cookie + "&localIP=" + ip;
          }
        }
      });
    }, 2000);
  });
</script>
</body>
</html>
