<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Cookie 状态</title>
<style>
  :root {
    --primary: #6366f1;
    --success: #10b981;
    --danger: #ef4444;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
    --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 40%, #f0fdf4 100%);
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 640px; margin: 0 auto; }
  .header {
    text-align: center;
    padding: 24px 0 16px;
    color: var(--text);
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 12px; color: var(--text-light); margin-top: 4px; }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead {
    background: #f8fafc;
  }
  th {
    padding: 12px 10px;
    text-align: center;
    font-weight: 600;
    color: var(--text-light);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 11px 10px;
    text-align: center;
    color: var(--text);
    border-bottom: 1px solid #f1f5f9;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8faff; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-ok { background: #d1fae5; color: #065f46; }
  .badge-fail { background: #fee2e2; color: #991b1b; }
  .footer {
    text-align: center;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-light);
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>&#128202; Cookie 状态</h1>
    <p>本页面每30分钟更新一次</p>
  </div>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>名字</th>
          <th>状态</th>
          <th>更新时间</th>
        </tr>
      </thead>
      <tbody>
        {% for user in lb %}
        <tr>
          <td>{{ user["id"] }}</td>
          <td><strong>{{ user["name"] }}</strong></td>
          {% if user["state"] == "登录失败" %}
          <td><span class="badge badge-fail">登录失败</span></td>
          {% else %}
          <td><span class="badge badge-ok">{{ user["state"] }}</span></td>
          {% endif %}
          <td>{{ user["up_time"] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="footer">Cookie 状态监控面板</div>
</div>
</body>
</html>
