<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>酷安自助更新Token</title>
<style>
  :root {
    --primary: #f97316;
    --primary-dark: #ea580c;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
    --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fff7ed 0%, #f1f5f9 40%, #fef2f2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container { width: 100%; max-width: 420px; }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header .icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    font-size: 26px;
    color: white;
    box-shadow: 0 4px 12px rgba(249,115,22,0.3);
  }
  .header h1 { font-size: 20px; font-weight: 700; color: var(--text); }
  .header p { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 20px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    color: var(--text);
    background: #f8fafc;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: vertical;
  }
  .form-group select { font-family: inherit; }
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
    background: white;
  }
  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    box-shadow: 0 2px 8px rgba(249,115,22,0.25);
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(249,115,22,0.35);
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">&#128295;</div>
    <h1>酷安自助更新 Token</h1>
    <p>酷安商城 Token 管理</p>
  </div>
  <div class="card">
    <form action="/coolapk_do" method="get" onsubmit="this.querySelector('button').disabled=true;">
      <div class="form-group">
        <label>Token</label>
        <textarea rows="5" id="token" name="token" placeholder="在此输入您的 Token..." oninput="value=value.replace(/[一-龥]/g,'')" required>{{ token }}</textarea>
      </div>
      <div class="form-group">
        <label>Product ID / 搜索内容</label>
        <textarea rows="2" id="product_id" name="product_id" placeholder="在此输入 product_id 或搜索内容" required>{{ product_id }}</textarea>
      </div>
      <div class="form-group">
        <label>价格</label>
        <textarea rows="1" id="price" name="price" placeholder="输入目标价格" oninput="value=value.replace(/[一-龥]/g,'')" required>{{ price }}</textarea>
      </div>
      <div class="form-group">
        <label>模式</label>
        <select id="switch_select" name="switch" required>
          <option value="0" {% if switch_value == '0' %}selected{% endif %}>关闭</option>
          <option value="1" {% if switch_value == '1' %}selected{% endif %}>产品交易</option>
          <option value="2" {% if switch_value == '2' %}selected{% endif %}>产品讨论</option>
          <option value="3" {% if switch_value == '3' %}selected{% endif %}>话题专区</option>
          <option value="4" {% if switch_value == '4' %}selected{% endif %}>动态搜索</option>
        </select>
      </div>
      <button type="submit" class="btn">&#9889; 更新 Token</button>
    </form>
  </div>
</div>
</body>
</html>
