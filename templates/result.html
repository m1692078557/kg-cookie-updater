<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>操作结果</title>
<style>
  :root {
    --primary: #6366f1;
    --success: #10b981;
    --danger: #ef4444;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --text-light: #64748b;
    --border: #e2e8f0;
    --radius: 16px;
    --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 40%, #f0fdf4 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 380px;
  }
  .card h2 {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
  }
  .row {
    display: flex;
    padding: 10px 0;
    border-bottom: 1px solid #f1f5f9;
    font-size: 13px;
  }
  .row:last-of-type { border-bottom: none; }
  .row .label {
    width: 70px;
    flex-shrink: 0;
    font-weight: 600;
    color: var(--text-light);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .row .value {
    color: var(--text);
    word-break: break-all;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-ok { background: #d1fae5; color: #065f46; }
  .badge-fail { background: #fee2e2; color: #991b1b; }
  .btn-back {
    display: block;
    text-align: center;
    margin-top: 18px;
    padding: 10px;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-back:hover { background: #4f46e5; }
</style>
</head>
<body>
<div class="card">
  <h2>&#10003; 操作结果</h2>
  <div class="row">
    <span class="label">名字</span>
    <span class="value"><strong>{{ name }}</strong></span>
  </div>
  <div class="row">
    <span class="label">状态</span>
    <span class="value">
      {% if state == "登录成功" %}
      <span class="badge badge-ok">{{ state }}</span>
      {% elif state == "登录失败" %}
      <span class="badge badge-fail">{{ state }}</span>
      {% else %}
      {{ state }}
      {% endif %}
    </span>
  </div>
  <div class="row">
    <span class="label">方式</span>
    <span class="value">{{ referer }}</span>
  </div>
  <div class="row">
    <span class="label">结果</span>
    <span class="value">
      {% if "成功" in result %}
      <span class="badge badge-ok">{{ result }}</span>
      {% else %}
      <span class="badge badge-fail">{{ result }}</span>
      {% endif %}
    </span>
  </div>
  <a href="/" class="btn-back">&#8592; 返回首页</a>
</div>
</body>
</html>
